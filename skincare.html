<!DOCTYPE html>
<html>
<head>
<style>
    body { 
        background-color: #ffccdd;
        background-image: radial-gradient(#ff99cc 15%, transparent 15%);
        background-size: 30px 30px; 
        padding: 20px; font-family: 'Courier New', monospace; 
    }
    .page { width: 1000px; margin: auto; border: 3px solid #ff99cc; background: white; padding: 20px; box-shadow: 10px 10px 0px #ffb3d9; }
    .nav-btn { display: inline-block; padding: 5px 15px; border: 2px outset #ff66b2; background: #fff0f5; text-decoration: none; color: #333; margin-bottom: 15px; }
    
    .section { border: 2px solid #ff99cc; margin-bottom: 25px; padding: 15px; background: #fffafb; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
    th { background: #ffccdd; border: 1px solid #ff99cc; padding: 8px; }
    td { border: 1px solid #ff99cc; padding: 8px; text-align: center; }
    
    /* 裝備圖片格 */
    .item-img { width: 60px; height: 60px; border: 1px dashed #ff99cc; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .item-img img { max-width: 100%; max-height: 100%; }

    input, textarea, select { border: 1px solid #ff99cc; padding: 3px; width: 90%; background: #fff; }
</style>
</head>
<body>
    <div class="page">
        <h2>✦ SKINCARE_QUEST_LOG ✦</h2>
        <a href="index.html" class="nav-btn">« 返回神殿首頁</a>

        <div class="section">
            <h3>⚔️ 裝備中 (In-Use)</h3>
            <table>
                <tr>
                    <th>裝備圖</th>
                    <th>名稱/類別</th>
                    <th>核心成分</th>
                    <th>主打功效</th>
                    <th>氣味/質地</th>
                    <th>初次印象評分</th>
                    <th>使用感受 (後期)</th>
                </tr>
                <tr>
                    <td><div class="item-img">📸</div></td>
                    <td>××× 精華</td>
                    <td><input type="text" placeholder="維C/A醇"></td>
                    <td><input type="text" placeholder="抗氧/緊致"></td>
                    <td><input type="text" placeholder="淡淡柑橘味"></td>
                    <td>⭐⭐⭐⭐⭐</td>
                    <td><textarea rows="1"></textarea></td>
                </tr>
            </table>
        </div>

        <div class="section">
            <h3>📦 囤貨清單 (Stockpile)</h3>
            <table>
                <tr>
                    <th>裝備圖</th>
                    <th>名稱</th>
                    <th>總量 (ml/g)</th>
                    <th>保質期</th>
                    <th>入手渠道/原因</th>
                    <th>狀態切換</th>
                </tr>
                <tr>
                    <td><div class="item-img">📦</div></td>
                    <td>防曬乳</td>
                    <td><input type="number" style="width:50px"> ml</td>
                    <td>2027-10</td>
                    <td><input type="text"></td>
                    <td><button>開始使用</button></td>
                </tr>
            </table>
        </div>

        <div class="section">
            <h3>🏆 戰利品總結 (Finished)</h3>
            <table>
                <tr>
                    <th>名稱</th>
                    <th>總消耗量</th>
                    <th>空瓶耗時</th>
                    <th>是否回購</th>
                    <th>最終經驗心得 (避雷/推薦)</th>
                </tr>
                <tr>
                    <td>舊面霜</td>
                    <td>50 ml</td>
                    <td>45 天</td>
                    <td>
                        <select>
                            <option>回購 (神作)</option>
                            <option>無功無過</option>
                            <option>雷品 (不再見)</option>
                        </select>
                    </td>
                    <td><textarea rows="1"></textarea></td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
