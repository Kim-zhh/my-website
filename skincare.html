<!DOCTYPE html>
<html>
<head>
<style>
    body { 
        background-color: #ffccdd;
        background-image: radial-gradient(#ff99cc 15%, transparent 15%);
        background-size: 30px 30px; 
        padding: 20px; font-family: 'Courier New', monospace; 
    }
    .page { width: 1000px; margin: auto; border: 3px solid #ff99cc; background: white; padding: 20px; box-shadow: 10px 10px 0px #ffb3d9; }
    .section { border: 2px solid #ff99cc; margin-bottom: 25px; padding: 15px; background: #fffafb; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
    th { background: #ffccdd; border: 1px solid #ff99cc; padding: 8px; }
    td { border: 1px solid #ff99cc; padding: 8px; text-align: center; }
    .btn-action { cursor: pointer; background: #ff99cc; color: white; border: 1px outset #ff66b2; padding: 2px 8px; font-size: 10px; }
    .btn-add { background: #00ccff; padding: 10px; color: white; border: none; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
</style>
</head>
<body>
    <div class="page">
        <h2>✦ SKINCARE_QUEST_LOG ✦</h2>
        <button class="btn-add" onclick="addItem()">+ 獲得新物品 (添加囤貨)</button>
        <a href="index.html" style="float:right; text-decoration:none;">« 返回首頁</a>

        <div class="section">
            <h3>⚔️ 裝備中 (In-Use)</h3>
            <table id="inUseTable">
                <tr><th>名稱</th><th>主打功效</th><th>氣味/質地</th><th>操作</th></tr>
                </table>
        </div>

        <div class="section">
            <h3>📦 囤貨清單 (Stockpile)</h3>
            <table id="stockTable">
                <tr><th>名稱</th><th>總量(ml)</th><th>保質期</th><th>操作</th></tr>
                <tr id="item-0">
                    <td>範例精華液</td>
                    <td>30ml</td>
                    <td>2027-12</td>
                    <td><button class="btn-action" onclick="moveToUse('item-0', '範例精華液')">開始使用</button></td>
                </tr>
            </table>
        </div>

        <div class="section">
            <h3>🏆 戰利品總結 (Finished)</h3>
            <table id="finishTable">
                <tr><th>名稱</th><th>最終評價</th><th>操作</th></tr>
            </table>
        </div>
    </div>

    <script>
        // 添加物品到囤貨區
        function addItem() {
            let name = prompt("請輸入護膚品名稱:");
            if (!name) return;
            let id = "item-" + Date.now();
            let table = document.getElementById("stockTable");
            let row = table.insertRow(-1);
            row.id = id;
            row.innerHTML = `<td>${name}</td><td>--</td><td>--</td><td><button class="btn-action" onclick="moveToUse('${id}', '${name}')">開始使用</button></td>`;
        }

        // 從囤貨移至使用中
        function moveToUse(id, name) {
            document.getElementById(id).remove();
            let table = document.getElementById("inUseTable");
            let row = table.insertRow(-1);
            row.id = id;
            row.innerHTML = `<td>${name}</td><td>待填寫</td><td>待填寫</td><td><button class="btn-action" onclick="moveToFinish('${id}', '${name}')">用完了!</button></td>`;
        }

        // 從使用中移至完成區
        function moveToFinish(id, name) {
            document.getElementById(id).remove();
            let table = document.getElementById("finishTable");
            let row = table.insertRow(-1);
            row.id = id;
            row.innerHTML = `<td>${name}</td><td>待評價</td><td><button class="btn-action" onclick="this.parentElement.parentElement.remove()">徹底刪除紀錄</button></td>`;
        }
    </script>
</body>
</html>
