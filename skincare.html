<!DOCTYPE html>
<html>
<head>
<style>
    body {

        padding: 20px; font-family: 'Courier New', monospace; 
    }
    .page { width: 900px; margin: auto; border: 3px solid #ff99cc; background: white; padding: 20px; }
    
    /* 返回按鈕的古典化設計 */
    .nav-btn { display: inline-block; padding: 5px 15px; border: 2px outset #ff66b2; background: #fff0f5; text-decoration: none; color: #333; font-weight: bold; margin-bottom: 10px; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background: #ffccdd; border: 1px solid #ff99cc; padding: 10px; }
    td { border: 1px solid #ff99cc; padding: 10px; text-align: center; }
    
    .img-placeholder { width: 80px; height: 80px; border: 1px dashed #ff99cc; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #ff99cc; }
    .status-check { transform: scale(1.5); }
</style>
</head>
<body>

            <table>
                <tr>

                    <th>名稱 (類別)</th>
                    <th>使用感受</th>
                    <th>消耗量</th>

                <tr>
                    <td class="img-placeholder">上傳圖片</td>
