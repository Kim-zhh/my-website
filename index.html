<!DOCTYPE html>
<html>
<head>
<style>
    /* 這裡定義了你要求的粉色格紋背景 */
    body { 
        background-color: #ffccdd;
        background-image: radial-gradient(#ff99cc 15%, transparent 15%);
        background-size: 20px 20px; 
        padding: 20px; 
        font-family: 'Courier New', monospace; 
    }
    .page-container { width: 900px; margin: auto; border: 3px solid #ff99cc; background: white; padding: 5px; }
    
    .header-banner { height: 150px; border: 2px solid #ff99cc; background: #fff0f5; margin-bottom: 10px; }
    
    .middle-row { display: flex; gap: 5px; margin-bottom: 5px; }
    .box { border: 2px solid #ff99cc; background: #fffafb; padding: 10px; }
    
    /* 左側：放置按鈕 */
    .stats-box { width: 220px; }
    .welcome-box { flex: 1; }
    .nav-box { width: 200px; }
    
    .btn { display: block; background: #ff99cc; color: white; padding: 10px; margin-top: 10px; text-align: center; border: 2px outset #ff66b2; text-decoration: none; font-weight: bold; }
</style>
</head>
<body>
    <div class="page-container">
        <div class="header-banner"></div> 
        
        <div class="middle-row">
            <div class="box stats-box">
                <h3>MENU</h3>
                <a href="closet.html" class="btn">✦ BEAUTY_CLOSET ✦</a>
            </div>
            <div class="box welcome-box">
                <h3>WEIGHT_LOSS_JOURNEY</h3>
                <p>××× KG</p>
            </div>
            <div class="box nav-box">
                <h3>NAVIGATION</h3>
            </div>
        </div>
        
        <div class="middle-row">
            <div class="box stats-box">×××</div>
            <div class="box welcome-box">CHAT_ROOM</div>
            <div class="box nav-box">UPDATES</div>
        </div>
    </div>
</body>
</html>
