<!DOCTYPE html>
<html>
<head>
<style>
    body { background: #ffcce5; padding: 20px; font-family: Arial, sans-serif; }
    .container { width: 900px; margin: auto; border: 2px solid #ff99cc; background: white; padding: 10px; }
    .banner { height: 150px; background: #ffb3d9; border: 2px solid #ff99cc; margin-bottom: 10px; }
    .nav-strip { height: 30px; background: #00ccff; border: 1px solid #000; margin-bottom: 10px; }
    .main-layout { display: flex; gap: 10px; }
    .box { border: 2px solid #ff99cc; padding: 10px; background: #fff0f5; }
    .stats { width: 200px; }
    .welcome { flex: 1; }
    .nav { width: 200px; }
    .bottom-row { display: flex; gap: 10px; margin-top: 10px; }
    .support { width: 200px; }
    .chat { flex: 1; }
    .updates { width: 200px; }
</style>
</head>
<body>
    <div class="container">
        <div class="banner"></div>
        <div class="nav-strip"></div>
        <div class="main-layout">
            <div class="box stats">×××</div>
            <div class="box welcome">×××</div>
            <div class="box nav">×××</div>
        </div>
        <div class="bottom-row">
            <div class="box support">×××</div>
            <div class="box chat">×××</div>
            <div class="box updates">×××</div>
        </div>
    </div>
</body>
</html>
