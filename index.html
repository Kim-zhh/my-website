  <!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>KIM'S SPACE</title>
    <style>
        body { background: #ffc0cb; font-family: sans-serif; margin: 0; padding: 10px; }
        .main-container { width: 800px; margin: 0 auto; border: 2px solid #ff69b4; background: white; padding: 10px; }
        /* 中間導航條：復刻第五張圖的藍色風格 */
        .nav-bar { background: linear-gradient(to right, #00bfff, #87cefa); padding: 10px; text-align: center; color: white; font-weight: bold; margin: 10px 0; border: 1px solid #000; }
        .content-grid { display: flex; gap: 10px; }
        .box { border: 1px solid #ff69b4; padding: 10px; background: #fff0f5; }
        .side { width: 200px; }
        .main { flex: 1; }
        .update-box { margin-top: 10px; border: 1px solid #00bfff; padding: 10px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="nav-bar">××× ××× ×××</div>
        
        <div class="content-grid">
            <div class="side box">
                <h3>×××</h3>
                <p>×××<br>×××</p>
            </div>
            <div class="main box">
                <h3>×××</h3>
                <p>×××<br>×××<br>×××</p>
            </div>
        </div>
        
        <div class="update-box">
            <p>×××<br>×××</p>
        </div>
    </div>
</body>
</html>
