<!DOCTYPE html>
<html>
<head>
<style>
    body { background: #ffccdd; padding: 10px; font-family: 'Courier New', monospace; }
    .page-container { width: 900px; margin: auto; border: 2px solid #ff99cc; background: white; padding: 5px; }
    
    /* 頂部區域 */
    .header-banner { height: 120px; border: 1px solid #ff99cc; margin-bottom: 5px; background: #fff0f5; }
    .nav-bar-strip { height: 25px; background: #ffb3d9; border: 1px solid #ff99cc; margin-bottom: 5px; }
    
    /* 中間三大區塊 */
    .middle-row { display: flex; gap: 5px; margin-bottom: 5px; }
    .box { border: 1px solid #ff99cc; background: #fffaf0; padding: 8px; }
    .stats-box { width: 220px; }
    .welcome-box { flex: 1; }
    .nav-box { width: 200px; }
    
    /* 下方區塊 */
    .bottom-row { display: flex; gap: 5px; }
    .support-box { width: 220px; }
    .chat-box { flex: 1; }
    .updates-box { width: 200px; }
</style>
</head>
<body>
    <div class="page-container">
        <div class="header-banner"></div>
        <div class="nav-bar-strip"></div>
        
        <div class="middle-row">
            <div class="box stats-box">×××</div>
            <div class="box welcome-box">×××</div>
            <div class="box nav-box">×××</div>
        </div>
        
        <div class="bottom-row">
            <div class="box support-box">×××</div>
            <div class="box chat-box">×××</div>
            <div class="box updates-box">×××</div>
        </div>
    </div>
</body>
</html>
